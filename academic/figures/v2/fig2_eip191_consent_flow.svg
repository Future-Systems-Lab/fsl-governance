<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      text { fill: #1E293B; }
      .title { font-size: 18px; font-weight: 700; }
      .lane-header { font-size: 12px; font-weight: 700; fill: #FFFFFF; }
      .step-num { font-size: 14px; font-weight: 700; }
      .step-label { font-size: 11px; font-weight: 600; }
      .step-desc { font-size: 9.5px; fill: #64748B; }
      .code { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 9px; fill: #475569; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-gold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#F59E0B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="800" y="35" text-anchor="middle" class="title">Figure 2. EIP-191 Wallet-Signed Consent Attestation Flow</text>
  <text x="800" y="52" text-anchor="middle" font-size="11" fill="#64748B">The consent event IS the authentication event — a single cryptographic act</text>

  <!-- Swimlane headers -->
  <rect x="60" y="70" width="200" height="32" rx="6" fill="#475569"/>
  <text x="160" y="91" text-anchor="middle" class="lane-header">PARTICIPANT</text>

  <rect x="310" y="70" width="280" height="32" rx="6" fill="#475569"/>
  <text x="450" y="91" text-anchor="middle" class="lane-header">BROWSER / BRAVE WALLET</text>

  <rect x="640" y="70" width="280" height="32" rx="6" fill="#475569"/>
  <text x="780" y="91" text-anchor="middle" class="lane-header">VERCEL SERVERLESS API</text>

  <rect x="970" y="70" width="200" height="32" rx="6" fill="#00B4D8"/>
  <text x="1070" y="91" text-anchor="middle" class="lane-header">ETHEREUM (SEPOLIA)</text>

  <rect x="1220" y="70" width="320" height="32" rx="6" fill="#475569"/>
  <text x="1380" y="91" text-anchor="middle" class="lane-header">RESULTING STATE</text>

  <!-- Swimlane lines -->
  <line x1="160" y1="106" x2="160" y2="940" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="450" y1="106" x2="450" y2="940" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="780" y1="106" x2="780" y2="940" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="1070" y1="106" x2="1070" y2="940" stroke="#00B4D8" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- ═══ STEP 1: Wallet Discovery ═══ -->
  <rect x="40" y="125" width="40" height="24" rx="4" fill="#475569"/>
  <text x="60" y="142" text-anchor="middle" class="step-num" fill="#FFFFFF">1</text>
  <text x="90" y="142" class="step-label">Wallet Discovery (EIP-6963)</text>

  <line x1="160" y1="155" x2="440" y2="155" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="170" text-anchor="middle" class="code">window.ethereum detected via EIP-6963 multi-provider</text>

  <rect x="330" y="180" width="240" height="30" rx="4" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="450" y="200" text-anchor="middle" class="step-desc">Brave Wallet, Rainbow, Rabby, or any EIP-1193</text>

  <!-- ═══ STEP 2: Account Request ═══ -->
  <rect x="40" y="230" width="40" height="24" rx="4" fill="#475569"/>
  <text x="60" y="247" text-anchor="middle" class="step-num" fill="#FFFFFF">2</text>
  <text x="90" y="247" class="step-label">Account Request</text>

  <line x1="450" y1="260" x2="450" y2="260" stroke="#475569" stroke-width="1.5"/>
  <rect x="320" y="265" width="260" height="28" rx="4" fill="#F1F5F9" stroke="#475569" stroke-width="0.8"/>
  <text x="450" y="284" text-anchor="middle" class="code">eth_requestAccounts → [0xf22c...F248]</text>

  <text x="1240" y="280" class="step-desc">Participant approves address sharing</text>
  <text x="1240" y="294" class="step-desc" fill="#DC2626">No name, email, or PII transmitted</text>

  <!-- ═══ STEP 3: Nonce Generation ═══ -->
  <rect x="40" y="320" width="40" height="24" rx="4" fill="#475569"/>
  <text x="60" y="337" text-anchor="middle" class="step-num" fill="#FFFFFF">3</text>
  <text x="90" y="337" class="step-label">Consent Message Construction</text>

  <line x1="450" y1="350" x2="770" y2="350" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="610" y="365" text-anchor="middle" class="code">Build message with wallet address + timestamp</text>

  <rect x="590" y="375" width="380" height="60" rx="4" fill="#F1F5F9" stroke="#475569" stroke-width="0.8"/>
  <text x="780" y="393" text-anchor="middle" class="code">"FSL Command Center Admin Auth"</text>
  <text x="780" y="407" text-anchor="middle" class="code">"Wallet: 0xf22c...F248"</text>
  <text x="780" y="421" text-anchor="middle" class="code">"Timestamp: 2026-05-12T21:30:00.000Z"</text>

  <text x="1240" y="400" class="step-desc">Message contains ONLY:</text>
  <text x="1240" y="414" class="step-desc">• Pseudonymous wallet address</text>
  <text x="1240" y="428" class="step-desc">• ISO timestamp</text>
  <text x="1240" y="442" class="step-desc" fill="#DC2626">• Zero PHI / Zero PII</text>

  <!-- ═══ STEP 4+5: CONSENT = AUTH (GOLD HIGHLIGHT) ═══ -->
  <rect x="30" y="470" width="1540" height="180" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2.5"/>

  <rect x="40" y="478" width="40" height="24" rx="4" fill="#F59E0B"/>
  <text x="60" y="495" text-anchor="middle" class="step-num" fill="#FFFFFF">4</text>
  <text x="90" y="495" font-size="13" font-weight="700" fill="#92400E">CRYPTOGRAPHIC CONSENT — personal_sign (EIP-191)</text>

  <line x1="160" y1="510" x2="440" y2="510" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow-gold)"/>
  <text x="300" y="525" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">Participant signs consent message</text>

  <rect x="320" y="535" width="260" height="30" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="450" y="555" text-anchor="middle" class="code" fill="#92400E">personal_sign(message, address) → 0x sig</text>

  <!-- The three-in-one callout -->
  <rect x="1220" y="480" width="340" height="100" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="1390" y="500" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">THIS SINGLE SIGNATURE IS:</text>
  <text x="1245" y="522" font-size="11" fill="#92400E">1. Identity verification</text>
  <text x="1383" y="522" font-size="9" fill="#B45309">(wallet owns this address)</text>
  <text x="1245" y="540" font-size="11" fill="#92400E">2. Informed consent</text>
  <text x="1370" y="540" font-size="9" fill="#B45309">(signed the consent text)</text>
  <text x="1245" y="558" font-size="11" fill="#92400E">3. Session authorization</text>
  <text x="1400" y="558" font-size="9" fill="#B45309">(JWT issued from this)</text>
  <text x="1390" y="574" text-anchor="middle" font-size="8" font-weight="600" fill="#B45309">Patent Pending — U.S. Provisional 64/063,037</text>

  <rect x="40" y="580" width="40" height="24" rx="4" fill="#F59E0B"/>
  <text x="60" y="597" text-anchor="middle" class="step-num" fill="#FFFFFF">5</text>
  <text x="90" y="597" font-size="11" font-weight="600" fill="#92400E">Signature transmitted to Vercel API</text>

  <line x1="450" y1="600" x2="770" y2="600" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow-gold)"/>
  <text x="610" y="615" text-anchor="middle" class="code" fill="#92400E">POST /api/auth { address, signature, message }</text>

  <line x1="450" y1="635" x2="770" y2="635" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow-gold)" transform="rotate(180, 610, 635)"/>
  <text x="610" y="645" text-anchor="middle" class="code" fill="#92400E">← 200 OK (signature valid, JWT issued)</text>

  <!-- ═══ STEP 6: ECDSA Recovery + JWT ═══ -->
  <rect x="40" y="670" width="40" height="24" rx="4" fill="#475569"/>
  <text x="60" y="687" text-anchor="middle" class="step-num" fill="#FFFFFF">6</text>
  <text x="90" y="687" class="step-label">Server-Side ECDSA Recovery</text>

  <rect x="620" y="700" width="320" height="55" rx="4" fill="#F1F5F9" stroke="#475569" stroke-width="0.8"/>
  <text x="780" y="718" text-anchor="middle" class="code">ethers.verifyMessage(message, signature)</text>
  <text x="780" y="732" text-anchor="middle" class="code">→ recovered address === claimed address</text>
  <text x="780" y="746" text-anchor="middle" class="code">→ issue JWT (HS256, httpOnly, 15min expiry)</text>

  <!-- ═══ STEP 7: Session Active ═══ -->
  <rect x="40" y="775" width="40" height="24" rx="4" fill="#059669"/>
  <text x="60" y="792" text-anchor="middle" class="step-num" fill="#FFFFFF">7</text>
  <text x="90" y="792" font-size="11" font-weight="600" fill="#059669">Wallet-Gated Session Active</text>

  <rect x="100" y="810" width="1050" height="35" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="625" y="833" text-anchor="middle" font-size="11" font-weight="600" fill="#065F46">AUTHENTICATED — JWT cookie set, wallet-gated content unlocked, consent cryptographically recorded</text>

  <text x="1240" y="825" class="step-desc">Session protected by:</text>
  <text x="1240" y="839" class="step-desc">• JWT with wallet address as subject</text>
  <text x="1240" y="853" class="step-desc">• 15-minute expiry, httpOnly cookie</text>
  <text x="1240" y="867" class="step-desc">• No username/password database</text>

  <!-- Bottom summary -->
  <rect x="40" y="900" width="1520" height="50" rx="6" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="800" y="920" text-anchor="middle" font-size="11" fill="#475569">Zero PII transmitted at any step. No email, name, password, or personal identifier enters FSL infrastructure.</text>
  <text x="800" y="938" text-anchor="middle" font-size="11" fill="#475569">Wallet addresses are pseudonymous — not linked to real-world identity by FSL. The consent signature is the only credential.</text>
</svg>
