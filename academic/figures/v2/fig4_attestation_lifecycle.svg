<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      text { fill: #1E293B; }
      .title { font-size: 18px; font-weight: 700; }
      .lane-head { font-size: 13px; font-weight: 700; fill: #FFFFFF; }
      .state { font-size: 13px; font-weight: 700; }
      .event { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 10px; fill: #0E7490; }
      .param { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 9px; fill: #64748B; }
      .desc { font-size: 10px; fill: #64748B; }
      .fn { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 10px; font-weight: 600; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arr-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00B4D8"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#059669"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="800" y="35" text-anchor="middle" class="title">Figure 4. Sovereign Guide Attestation Lifecycle</text>
  <text x="800" y="55" text-anchor="middle" font-size="11" fill="#64748B">SovereignSession contract — on-chain record contains only wallet addresses and timestamps, no session content</text>
  <text x="800" y="72" text-anchor="middle" font-size="10" fill="#94A3B8">Contract: 0xbeb13A360C6F0C77Ea3af3650Ab9762a1B9965A1 (Sepolia)</text>

  <!-- ═══ THREE SWIMLANES ═══ -->
  <!-- Sovereign Guide lane -->
  <rect x="60" y="95" width="350" height="36" rx="6" fill="#475569"/>
  <text x="235" y="119" text-anchor="middle" class="lane-head">SOVEREIGN GUIDE</text>
  <rect x="60" y="131" width="350" height="510" rx="0" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="0.5"/>

  <!-- On-Chain lane -->
  <rect x="440" y="95" width="450" height="36" rx="6" fill="#00B4D8"/>
  <text x="665" y="119" text-anchor="middle" class="lane-head">ON-CHAIN (SovereignSession Contract)</text>
  <rect x="440" y="131" width="450" height="510" rx="0" fill="#F0FDFA" stroke="#00B4D8" stroke-width="0.5"/>

  <!-- Participant lane -->
  <rect x="920" y="95" width="350" height="36" rx="6" fill="#475569"/>
  <text x="1095" y="119" text-anchor="middle" class="lane-head">PARTICIPANT</text>
  <rect x="920" y="131" width="350" height="510" rx="0" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="0.5"/>

  <!-- On-chain data box (right side) -->
  <rect x="1300" y="95" width="270" height="546" rx="8" fill="#ECFDF5" stroke="#00B4D8" stroke-width="1"/>
  <text x="1435" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#0E7490">ON-CHAIN DATA</text>
  <text x="1435" y="134" text-anchor="middle" font-size="9" fill="#64748B">(publicly queryable)</text>

  <!-- ═══ PHASE: PRE-SESSION ═══ -->
  <text x="80" y="158" font-size="10" font-weight="600" fill="#94A3B8">PRE-SESSION</text>

  <!-- Step 1: Guide initiates -->
  <rect x="80" y="170" width="310" height="55" rx="6" fill="#FFFFFF" stroke="#475569" stroke-width="1"/>
  <text x="235" y="190" text-anchor="middle" class="fn" fill="#475569">startSession(_participant, _sessionId)</text>
  <text x="235" y="207" text-anchor="middle" class="desc">Guide signs transaction (msg.sender verified)</text>
  <text x="235" y="219" text-anchor="middle" class="param">Participant address passed as parameter</text>

  <!-- Arrow to on-chain -->
  <line x1="390" y1="197" x2="450" y2="197" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="420" y="190" text-anchor="middle" font-size="8" fill="#94A3B8">tx</text>

  <!-- On-chain: Session Created -->
  <rect x="460" y="170" width="410" height="55" rx="6" fill="#FFFFFF" stroke="#00B4D8" stroke-width="1.5"/>
  <text x="665" y="190" text-anchor="middle" class="event">emit SessionStarted(</text>
  <text x="665" y="204" text-anchor="middle" class="param">sessionId, guide, participant, block.timestamp</text>
  <text x="665" y="218" text-anchor="middle" class="event">)</text>

  <!-- Emit to participant -->
  <line x1="870" y1="197" x2="930" y2="197" stroke="#00B4D8" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <text x="900" y="190" text-anchor="middle" font-size="8" fill="#00B4D8">event</text>

  <!-- Participant receives -->
  <rect x="940" y="175" width="240" height="40" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <text x="1060" y="195" text-anchor="middle" class="desc">Session attestation recorded</text>
  <text x="1060" y="209" text-anchor="middle" class="param">Participant notified via event</text>

  <!-- On-chain data: session started -->
  <text x="1320" y="180" class="param">sessions[id].guide = 0xf22c...</text>
  <text x="1320" y="195" class="param">sessions[id].participant = 0x...</text>
  <text x="1320" y="210" class="param">sessions[id].startTime = now</text>
  <text x="1320" y="225" class="param">sessions[id].active = true</text>

  <!-- Important callout: single-party -->
  <rect x="80" y="235" width="310" height="28" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="235" y="254" text-anchor="middle" font-size="9" font-weight="600" fill="#92400E">CURRENT: Guide-initiated only (single-party auth)</text>

  <!-- ═══ PHASE: ACTIVE SESSION ═══ -->
  <text x="80" y="295" font-size="10" font-weight="600" fill="#94A3B8">ACTIVE SESSION</text>

  <rect x="80" y="305" width="1180" height="80" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="665" y="330" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">OFF-CHAIN ENGAGEMENT</text>
  <text x="665" y="350" text-anchor="middle" class="desc">Video via Daily.co WebRTC — wallet-authenticated, SovereignLedger-anchored</text>
  <text x="665" y="367" text-anchor="middle" font-size="9" font-weight="600" fill="#DC2626">No session content recorded on-chain. No audio, video, or clinical data touches the blockchain.</text>

  <text x="1320" y="320" class="param" fill="#DC2626">NOTHING RECORDED</text>
  <text x="1320" y="335" class="param" fill="#DC2626">during active session.</text>
  <text x="1320" y="350" class="param" fill="#DC2626">On-chain = attestation only.</text>

  <!-- ═══ PHASE: SESSION END ═══ -->
  <text x="80" y="415" font-size="10" font-weight="600" fill="#94A3B8">SESSION COMPLETE</text>

  <!-- Guide can end -->
  <rect x="80" y="425" width="310" height="40" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1"/>
  <text x="235" y="445" text-anchor="middle" class="fn" fill="#059669">endSession(_sessionId)</text>
  <text x="235" y="458" text-anchor="middle" class="desc">Guide signs tx to end session</text>

  <line x1="390" y1="445" x2="450" y2="445" stroke="#059669" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- OR participant can end -->
  <rect x="940" y="425" width="240" height="40" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1"/>
  <text x="1060" y="445" text-anchor="middle" class="fn" fill="#059669">endSession(_sessionId)</text>
  <text x="1060" y="458" text-anchor="middle" class="desc">Participant can also end</text>

  <line x1="920" y1="445" x2="890" y2="445" stroke="#059669" stroke-width="2" marker-end="url(#arr-green)" transform="rotate(180, 905, 445)"/>

  <!-- "either party" label -->
  <rect x="460" y="425" width="410" height="40" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <text x="665" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#065F46">EITHER PARTY can call endSession()</text>
  <text x="665" y="455" text-anchor="middle" class="param">require(msg.sender == guide || msg.sender == participant)</text>

  <!-- SessionEnded event -->
  <rect x="460" y="480" width="410" height="55" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <text x="665" y="500" text-anchor="middle" class="event" fill="#065F46">emit SessionEnded(</text>
  <text x="665" y="514" text-anchor="middle" class="param">sessionId, guide, participant, startTime, endTime, duration</text>
  <text x="665" y="528" text-anchor="middle" class="event" fill="#065F46">)</text>

  <!-- On-chain data: session ended -->
  <text x="1320" y="430" class="param">sessions[id].endTime = now</text>
  <text x="1320" y="445" class="param">sessions[id].active = false</text>
  <text x="1320" y="465" class="param" fill="#059669">Immutable record:</text>
  <text x="1320" y="480" class="param">• Two wallet addresses</text>
  <text x="1320" y="495" class="param">• Start + end timestamps</text>
  <text x="1320" y="510" class="param">• Duration in seconds</text>
  <text x="1320" y="530" class="param" fill="#DC2626">• No session content</text>
  <text x="1320" y="545" class="param" fill="#DC2626">• No clinical data</text>
  <text x="1320" y="560" class="param" fill="#DC2626">• No PII</text>

  <!-- ═══ PHASE 5 ANNOTATION ═══ -->
  <rect x="60" y="665" width="1510" height="120" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="800" y="690" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">PHASE 5 — DOCTORAL CAPSTONE (Post-ASU Acceptance)</text>
  <text x="800" y="710" text-anchor="middle" font-size="11" fill="#92400E">Advances SovereignSession from single-party attestation to bilateral cryptographic consent</text>

  <rect x="85" y="725" width="700" height="45" rx="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1"/>
  <text x="435" y="744" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">1. Two-Party Mutual Authentication</text>
  <text x="435" y="760" text-anchor="middle" font-size="9" fill="#B45309">Both Guide AND Participant submit EIP-191 signatures before session start. Contract verifies both on-chain.</text>

  <rect x="810" y="725" width="735" height="45" rx="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1"/>
  <text x="1177" y="744" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">2. Client-Side Encrypted Recording</text>
  <text x="1177" y="760" text-anchor="middle" font-size="9" fill="#B45309">AES-256-GCM in browser, IPFS-pinned, on-chain hash proof, participant-controlled decryption key.</text>

  <!-- Bottom: No competitor -->
  <rect x="60" y="810" width="1510" height="35" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1"/>
  <text x="800" y="833" text-anchor="middle" font-size="11" font-weight="600" fill="#DC2626">No existing telehealth platform — including Doxy.me, Daily.co, Zoom — implements two-party wallet-signed mutual consent with client-side encrypted recording and on-chain attestation.</text>

  <!-- Contract address footer -->
  <text x="800" y="880" text-anchor="middle" font-size="9" fill="#94A3B8">SovereignSession: 0xbeb13A360C6F0C77Ea3af3650Ab9762a1B9965A1 — Verified on Blockscout (Sepolia Testnet)</text>
</svg>
