<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      text { fill: #1E293B; }
      .title { font-size: 24px; font-weight: 700; }
      .subtitle { font-size: 15px; fill: #475569; }
      .layer { font-size: 16px; font-weight: 700; letter-spacing: 1.5px; }
      .plat-name { font-size: 16px; font-weight: 700; fill: #FFFFFF; }
      .plat-desc { font-size: 13px; fill: #475569; }
      .contract { font-size: 14px; font-weight: 600; fill: #0E7490; }
      .access { font-size: 11px; font-weight: 600; }
      .group-head { font-size: 13px; font-weight: 700; fill: #475569; }
      .db-label { font-size: 15px; font-weight: 700; fill: #FFFFFF; }
      .db-desc { font-size: 12px; fill: #475569; }
      .zero-phi { font-size: 14px; font-weight: 700; fill: #DC2626; }
      .banner { font-size: 15px; font-weight: 700; }
      .phase5 { font-size: 13px; font-weight: 700; fill: #6D28D9; }
      .phase5-desc { font-size: 12px; fill: #7C3AED; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="800" y="38" text-anchor="middle" class="title">Figure 1. System Architecture — FSL Decentralized Health Data Infrastructure</text>
  <text x="800" y="58" text-anchor="middle" class="subtitle">Five platforms share unified EIP-191 authentication connecting to nine on-chain smart contracts</text>

  <!-- PLATFORM LAYER -->
  <text x="40" y="90" class="layer" fill="#475569">PLATFORM LAYER</text>
  <line x1="210" y1="86" x2="1560" y2="86" stroke="#E2E8F0" stroke-width="1"/>

  <!-- 5 platform boxes — simplified, no URLs or badges -->
  <rect x="40" y="105" width="280" height="80" rx="8" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
  <rect x="40" y="105" width="280" height="30" rx="8" fill="#475569"/>
  <rect x="40" y="122" width="280" height="13" fill="#475569"/>
  <text x="180" y="126" text-anchor="middle" class="plat-name">EncryptHealth</text>
  <text x="180" y="155" text-anchor="middle" class="plat-desc">Sovereign health records</text>
  <text x="180" y="173" text-anchor="middle" class="plat-desc">Wallet-gated consent architecture</text>

  <rect x="350" y="105" width="280" height="80" rx="8" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
  <rect x="350" y="105" width="280" height="30" rx="8" fill="#475569"/>
  <rect x="350" y="122" width="280" height="13" fill="#475569"/>
  <text x="490" y="126" text-anchor="middle" class="plat-name">HypnoNeuro</text>
  <text x="490" y="155" text-anchor="middle" class="plat-desc">Therapeutic game demos (L1/L2/L3)</text>
  <text x="490" y="173" text-anchor="middle" class="plat-desc">HNT token + NFT gating</text>

  <rect x="660" y="105" width="280" height="80" rx="8" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
  <rect x="660" y="105" width="280" height="30" rx="8" fill="#475569"/>
  <rect x="660" y="122" width="280" height="13" fill="#475569"/>
  <text x="800" y="126" text-anchor="middle" class="plat-name">SovereignLedger</text>
  <text x="800" y="155" text-anchor="middle" class="plat-desc">Session governance + attestation</text>
  <text x="800" y="173" text-anchor="middle" class="plat-desc">Dual-chain: Sepolia + XRPL</text>

  <rect x="970" y="105" width="280" height="80" rx="8" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
  <rect x="970" y="105" width="280" height="30" rx="8" fill="#475569"/>
  <rect x="970" y="122" width="280" height="13" fill="#475569"/>
  <text x="1110" y="126" text-anchor="middle" class="plat-name">AlchemistForge</text>
  <text x="1110" y="155" text-anchor="middle" class="plat-desc">Permissionless shadow integration</text>
  <text x="1110" y="173" text-anchor="middle" class="plat-desc">No owner, no admin, no pause</text>

  <rect x="1280" y="105" width="280" height="80" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="1280" y="105" width="280" height="30" rx="8" fill="#94A3B8"/>
  <rect x="1280" y="122" width="280" height="13" fill="#94A3B8"/>
  <text x="1420" y="126" text-anchor="middle" class="plat-name">NeuroBalance</text>
  <text x="1420" y="155" text-anchor="middle" class="plat-desc">Biosensor integration layer</text>
  <text x="1420" y="173" text-anchor="middle" font-size="12" fill="#94A3B8">Scaffolded</text>

  <!-- Dashed lines to auth bus -->
  <line x1="180" y1="185" x2="180" y2="205" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="490" y1="185" x2="490" y2="205" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="800" y1="185" x2="800" y2="205" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="1110" y1="185" x2="1110" y2="205" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="1420" y1="185" x2="1420" y2="205" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- EIP-191 AUTH BUS -->
  <rect x="40" y="205" width="1520" height="48" rx="6" fill="#FFFBEB" stroke="#FFD700" stroke-width="2.5"/>
  <text x="800" y="225" text-anchor="middle" class="banner" fill="#92400E">EIP-191 WALLET-SIGNED CONSENT — UNIFIED AUTHENTICATION PRIMITIVE</text>
  <text x="800" y="243" text-anchor="middle" font-size="13" fill="#92400E">Single cryptographic signature = identity + consent + authorization (Patent Pending 64/063,037)</text>

  <!-- ON-CHAIN LAYER -->
  <rect x="40" y="275" width="1520" height="290" rx="8" fill="#E6F9FF" stroke="#00D9FF" stroke-width="1.5"/>
  <text x="60" y="300" class="layer" fill="#00D9FF">ON-CHAIN — ETHEREUM SEPOLIA</text>

  <!-- Owner-controlled row -->
  <text x="60" y="328" class="group-head">OWNER-CONTROLLED</text>
  <rect x="60" y="338" width="230" height="50" rx="6" fill="#FFFFFF" stroke="#00D9FF" stroke-width="1.2"/>
  <text x="175" y="360" text-anchor="middle" class="contract">HypnoNeuroToken (HNT)</text>
  <text x="175" y="378" text-anchor="middle" font-size="11" fill="#00D9FF">ERC-20 engagement token</text>

  <rect x="310" y="338" width="200" height="50" rx="6" fill="#FFFFFF" stroke="#00D9FF" stroke-width="1.2"/>
  <text x="410" y="360" text-anchor="middle" class="contract">EHTv2</text>
  <text x="410" y="378" text-anchor="middle" font-size="11" fill="#00D9FF">ERC-20 — 144K cap</text>

  <rect x="530" y="338" width="220" height="50" rx="6" fill="#FFFFFF" stroke="#00D9FF" stroke-width="1.2"/>
  <text x="640" y="360" text-anchor="middle" class="contract">MindMasteryNFT</text>
  <text x="640" y="378" text-anchor="middle" font-size="11" fill="#00D9FF">ERC-1155 achievement</text>

  <rect x="770" y="338" width="230" height="50" rx="6" fill="#FFFFFF" stroke="#00D9FF" stroke-width="1.2"/>
  <text x="885" y="360" text-anchor="middle" class="contract">BenevolenceFund v2</text>
  <text x="885" y="378" text-anchor="middle" font-size="11" fill="#00D9FF">3% community treasury</text>

  <rect x="1020" y="338" width="250" height="50" rx="6" fill="#FFFFFF" stroke="#00D9FF" stroke-width="1.2"/>
  <text x="1145" y="360" text-anchor="middle" class="contract">SovereignAchievement</text>
  <text x="1145" y="378" text-anchor="middle" font-size="11" fill="#00D9FF">Soulbound — 20 tiers</text>

  <rect x="1290" y="338" width="250" height="50" rx="6" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="1415" y="360" text-anchor="middle" font-size="14" font-weight="600" fill="#94A3B8">NeuroBalanceConsent</text>
  <text x="1415" y="378" text-anchor="middle" font-size="11" fill="#94A3B8">Scaffolded</text>

  <!-- Open/Permissionless row -->
  <text x="60" y="418" class="group-head">OPEN REGISTRATION / PERMISSIONLESS</text>
  <rect x="60" y="428" width="300" height="50" rx="6" fill="#FFFFFF" stroke="#00D9FF" stroke-width="1.5"/>
  <text x="210" y="450" text-anchor="middle" class="contract">SovereignLedger v2</text>
  <text x="210" y="468" text-anchor="middle" font-size="11" fill="#00D9FF">Session governance — open registration</text>

  <rect x="390" y="428" width="300" height="50" rx="6" fill="#FFFFFF" stroke="#22CC66" stroke-width="1.5"/>
  <text x="540" y="450" text-anchor="middle" font-size="14" font-weight="600" fill="#065F46">AlchemistForge</text>
  <text x="540" y="468" text-anchor="middle" font-size="11" fill="#22CC66">Fully permissionless</text>

  <rect x="720" y="428" width="300" height="50" rx="6" fill="#FFFFFF" stroke="#00D9FF" stroke-width="1.2"/>
  <text x="870" y="450" text-anchor="middle" class="contract">SovereignSession</text>
  <text x="870" y="468" text-anchor="middle" font-size="11" fill="#00D9FF">Guide-initiated attestation</text>

  <!-- Phase 5 box -->
  <rect x="1050" y="428" width="510" height="50" rx="6" fill="#F3E8FF" stroke="#7B2FBE" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="1305" y="448" text-anchor="middle" class="phase5">PHASE 5 — DOCTORAL CAPSTONE (planned)</text>
  <text x="1305" y="466" text-anchor="middle" class="phase5-desc">Two-party mutual EIP-191 auth + client-side encrypted recording</text>

  <!-- ON/OFF BOUNDARY -->
  <rect x="40" y="500" width="1520" height="2" fill="#CBD5E1"/>
  <text x="800" y="520" text-anchor="middle" font-size="13" font-weight="600" fill="#94A3B8">ON-CHAIN / OFF-CHAIN BOUNDARY</text>

  <!-- OFF-CHAIN LAYER -->
  <rect x="40" y="535" width="1520" height="280" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="60" y="560" class="layer" fill="#475569">OFF-CHAIN — ENGAGEMENT METADATA ONLY</text>

  <!-- PostgreSQL -->
  <rect x="60" y="575" width="500" height="115" rx="6" fill="#FFFFFF" stroke="#475569" stroke-width="1.2"/>
  <rect x="60" y="575" width="500" height="30" rx="6" fill="#475569"/>
  <rect x="60" y="592" width="500" height="13" fill="#475569"/>
  <text x="310" y="596" text-anchor="middle" class="db-label">PostgreSQL 17</text>
  <text x="310" y="624" text-anchor="middle" class="db-desc">Session timestamps, wallet addresses, completion rates</text>
  <text x="310" y="644" text-anchor="middle" class="db-desc">Consent grants, achievement logs, engagement scores</text>
  <rect x="80" y="660" width="460" height="22" rx="4" fill="#FEF2F2" stroke="#FF4444" stroke-width="1"/>
  <text x="310" y="676" text-anchor="middle" class="zero-phi">ZERO PHI — No names, DOB, SSN, diagnosis, clinical content</text>

  <!-- IPFS -->
  <rect x="590" y="575" width="370" height="115" rx="6" fill="#FFFFFF" stroke="#475569" stroke-width="1.2"/>
  <rect x="590" y="575" width="370" height="30" rx="6" fill="#475569"/>
  <rect x="590" y="592" width="370" height="13" fill="#475569"/>
  <text x="775" y="596" text-anchor="middle" class="db-label">IPFS (Pinata)</text>
  <text x="775" y="624" text-anchor="middle" class="db-desc">Encrypted documents — wallet-gated access</text>
  <text x="775" y="644" text-anchor="middle" class="db-desc">Participant holds sole decryption key</text>
  <rect x="610" y="660" width="330" height="22" rx="4" fill="#FEF2F2" stroke="#FF4444" stroke-width="1"/>
  <text x="775" y="676" text-anchor="middle" font-size="13" font-weight="700" fill="#DC2626">Content encrypted — key held by participant</text>

  <!-- VPS -->
  <rect x="990" y="575" width="280" height="115" rx="6" fill="#FFFFFF" stroke="#475569" stroke-width="1.2"/>
  <rect x="990" y="575" width="280" height="30" rx="6" fill="#475569"/>
  <rect x="990" y="592" width="280" height="13" fill="#475569"/>
  <text x="1130" y="596" text-anchor="middle" class="db-label">VPS — API Server</text>
  <text x="1130" y="624" text-anchor="middle" class="db-desc">PM2 process manager</text>
  <text x="1130" y="644" text-anchor="middle" class="db-desc">17-agent AI council</text>
  <rect x="1010" y="660" width="240" height="22" rx="4" fill="#FFFBEB" stroke="#FFB400" stroke-width="1"/>
  <text x="1130" y="676" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">Centralized — migrate to Akash</text>

  <!-- XRPL -->
  <rect x="1300" y="575" width="240" height="115" rx="6" fill="#FFFFFF" stroke="#475569" stroke-width="1.2"/>
  <rect x="1300" y="575" width="240" height="30" rx="6" fill="#475569"/>
  <rect x="1300" y="592" width="240" height="13" fill="#475569"/>
  <text x="1420" y="596" text-anchor="middle" class="db-label">XRPL Testnet</text>
  <text x="1420" y="624" text-anchor="middle" class="db-desc">Dual-chain session anchor</text>
  <text x="1420" y="644" text-anchor="middle" class="db-desc">ISO 20022 payment rails</text>
  <rect x="1320" y="660" width="200" height="22" rx="4" fill="#E6F9FF" stroke="#00D9FF" stroke-width="1"/>
  <text x="1420" y="676" text-anchor="middle" font-size="12" font-weight="600" fill="#0E7490">Secondary anchor</text>

  <!-- Zero-PHI bottom banner -->
  <rect x="40" y="840" width="1520" height="36" rx="6" fill="#FEF2F2" stroke="#FF4444" stroke-width="1.5"/>
  <text x="800" y="864" text-anchor="middle" font-size="15" font-weight="700" fill="#DC2626">ZERO-PHI ARCHITECTURE — FSL operates outside HIPAA scope by holding no Protected Health Information</text>
</svg>
