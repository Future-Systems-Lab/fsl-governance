<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      text { fill: #1E293B; }
      .title { font-size: 18px; font-weight: 700; }
      .tier-title { font-size: 14px; font-weight: 700; }
      .item { font-size: 10.5px; fill: #334155; }
      .excl { font-size: 10.5px; fill: #DC2626; }
      .note { font-size: 9px; fill: #64748B; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="800" y="35" text-anchor="middle" class="title">Figure 3. Zero-PHI Data Classification Model</text>
  <text x="800" y="55" text-anchor="middle" font-size="11" fill="#64748B">No tier contains any of the 18 HIPAA Safe Harbor identifiers — FSL operates outside HIPAA scope by design</text>

  <!-- ═══ LEFT PANEL: WHAT FSL STORES ═══ -->
  <rect x="40" y="80" width="780" height="740" rx="8" fill="#F0FDFA" stroke="#00B4D8" stroke-width="2"/>
  <rect x="40" y="80" width="780" height="40" rx="8" fill="#00B4D8"/>
  <rect x="40" y="105" width="780" height="15" fill="#00B4D8"/>
  <text x="430" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">WHAT FSL STORES — Engagement Metadata Only</text>

  <!-- Tier 1: On-Chain -->
  <rect x="65" y="140" width="730" height="185" rx="6" fill="#FFFFFF" stroke="#00B4D8" stroke-width="1.5"/>
  <rect x="65" y="140" width="730" height="30" rx="6" fill="#ECFDF5"/>
  <rect x="65" y="157" width="730" height="13" fill="#ECFDF5"/>
  <text x="85" y="161" class="tier-title" fill="#0E7490">TIER 1 — On-Chain (Public, Immutable)</text>
  <rect x="510" y="145" width="120" height="18" rx="4" fill="#00B4D8"/>
  <text x="570" y="158" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF">Ethereum Sepolia</text>

  <text x="85" y="195" class="item">Consent attestation hashes (SHA-256 of consent message + signature)</text>
  <text x="85" y="215" class="item">SessionStarted events: sessionId, guide address, participant address, timestamp</text>
  <text x="85" y="235" class="item">SessionEnded events: sessionId, addresses, startTime, endTime, duration</text>
  <text x="85" y="255" class="item">ShadowRecorded / Celebrated events (AlchemistForge): wallet address + voluntary text hash</text>
  <text x="85" y="275" class="item">Soulbound achievement tokens (MindMasteryNFT, SovereignAchievement): wallet + tier</text>
  <text x="85" y="295" class="item">HNT / EHT token balances: wallet address + amount</text>
  <text x="85" y="312" class="note">All data publicly queryable on Blockscout. Contains ONLY pseudonymous wallet addresses + engagement metadata.</text>

  <!-- Tier 2: Off-Chain Encrypted -->
  <rect x="65" y="340" width="730" height="155" rx="6" fill="#FFFFFF" stroke="#475569" stroke-width="1.5"/>
  <rect x="65" y="340" width="730" height="30" rx="6" fill="#F1F5F9"/>
  <rect x="65" y="357" width="730" height="13" fill="#F1F5F9"/>
  <text x="85" y="361" class="tier-title" fill="#475569">TIER 2 — Off-Chain (Encrypted at Rest, Server-Held)</text>
  <rect x="510" y="345" width="120" height="18" rx="4" fill="#475569"/>
  <text x="570" y="358" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF">PostgreSQL 17</text>

  <text x="85" y="395" class="item">session_logs: wallet_address, session_type, timestamp, duration, content_hash, xrpl_tx_hash</text>
  <text x="85" y="415" class="item">consent_grants: wallet_address, grant_type, signature_hash, expiry_timestamp</text>
  <text x="85" y="435" class="item">achievement_log: wallet_address, game_name, level, tier, mint_tx_hash</text>
  <text x="85" y="455" class="item">aggregate_wellness_metrics: wallet_address, session_count, completion_rate, last_active</text>
  <text x="85" y="475" class="note">Engagement-derived metrics only. No clinical measurements, no diagnosis, no treatment plans, no notes.</text>

  <!-- Tier 3: IPFS Wallet-Gated -->
  <rect x="65" y="510" width="730" height="130" rx="6" fill="#FFFFFF" stroke="#475569" stroke-width="1"/>
  <rect x="65" y="510" width="730" height="30" rx="6" fill="#F8FAFC"/>
  <rect x="65" y="527" width="730" height="13" fill="#F8FAFC"/>
  <text x="85" y="531" class="tier-title" fill="#475569">TIER 3 — Off-Chain (IPFS, Wallet-Gated Decryption)</text>
  <rect x="510" y="515" width="130" height="18" rx="4" fill="#475569"/>
  <text x="575" y="528" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF">Pinata / IPFS</text>

  <text x="85" y="565" class="item">Encrypted documents: only the content hash stored on-chain</text>
  <text x="85" y="585" class="item">Access requires wallet signature — no auto-play, no server-side decryption</text>
  <text x="85" y="605" class="item">Participant holds sole decryption key</text>
  <text x="85" y="625" class="note">Content never readable by FSL infrastructure. Hash on-chain proves existence without revealing content.</text>

  <!-- Wallet address note -->
  <rect x="65" y="660" width="730" height="45" rx="6" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1"/>
  <text x="430" y="680" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">NOTE: Wallet addresses appear in all three tiers. They are pseudonymous identifiers —</text>
  <text x="430" y="696" text-anchor="middle" font-size="10" fill="#92400E">not linked to real-world identity by FSL infrastructure. Address clustering can correlate</text>
  <text x="430" y="712" text-anchor="middle" font-size="10" fill="#92400E">addresses, but even if linked, the on-chain data contains no health information.</text>

  <!-- ═══ RIGHT PANEL: WHAT FSL DOES NOT STORE ═══ -->
  <rect x="850" y="80" width="710" height="740" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
  <rect x="850" y="80" width="710" height="40" rx="8" fill="#EF4444"/>
  <rect x="850" y="105" width="710" height="15" fill="#EF4444"/>
  <text x="1205" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">WHAT FSL DOES NOT STORE — 18 Safe Harbor Identifiers</text>

  <!-- 18 identifiers with X marks -->
  <text x="880" y="152" font-size="12" font-weight="600" fill="#991B1B">45 CFR §164.514(b)(2) — All 18 identifiers excluded:</text>

  <!-- Column 1 -->
  <text x="880" y="185" class="excl">&#10007;  (A) Names</text>
  <text x="880" y="210" class="excl">&#10007;  (B) Geographic subdivisions smaller than state</text>
  <text x="880" y="235" class="excl">&#10007;  (C) Dates (birth, admission, discharge, death)</text>
  <text x="880" y="260" class="excl">&#10007;  (D) Telephone numbers</text>
  <text x="880" y="285" class="excl">&#10007;  (E) Fax numbers</text>
  <text x="880" y="310" class="excl">&#10007;  (F) Email addresses</text>
  <text x="880" y="335" class="excl">&#10007;  (G) Social Security numbers</text>
  <text x="880" y="360" class="excl">&#10007;  (H) Medical record numbers</text>
  <text x="880" y="385" class="excl">&#10007;  (I) Health plan beneficiary numbers</text>
  <text x="880" y="410" class="excl">&#10007;  (J) Account numbers</text>
  <text x="880" y="435" class="excl">&#10007;  (K) Certificate/license numbers</text>
  <text x="880" y="460" class="excl">&#10007;  (L) Vehicle identifiers and serial numbers</text>
  <text x="880" y="485" class="excl">&#10007;  (M) Device identifiers and serial numbers</text>
  <text x="880" y="510" class="excl">&#10007;  (N) Web URLs</text>
  <text x="880" y="535" class="excl">&#10007;  (O) IP addresses</text>
  <text x="880" y="560" class="excl">&#10007;  (P) Biometric identifiers</text>
  <text x="880" y="585" class="excl">&#10007;  (Q) Full-face photographs</text>
  <text x="880" y="610" class="excl">&#10007;  (R) Any other unique identifying number</text>

  <!-- Verdict box -->
  <rect x="875" y="640" width="660" height="80" rx="8" fill="#FFFFFF" stroke="#EF4444" stroke-width="2"/>
  <text x="1205" y="667" text-anchor="middle" font-size="14" font-weight="700" fill="#DC2626">RESULT: FSL IS NOT A COVERED ENTITY</text>
  <text x="1205" y="690" text-anchor="middle" font-size="11" fill="#991B1B">HIPAA does not apply when the system never holds the protected data.</text>
  <text x="1205" y="708" text-anchor="middle" font-size="10" fill="#64748B">This is a stronger position than compliance — the regulation is architecturally inapplicable.</text>

  <!-- Additional exclusions note -->
  <rect x="875" y="735" width="660" height="65" rx="6" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1"/>
  <text x="1205" y="755" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">ALSO NOT STORED (beyond Safe Harbor):</text>
  <text x="1205" y="775" text-anchor="middle" font-size="10" fill="#92400E">No diagnosis codes (ICD-10). No treatment plans. No clinical notes.</text>
  <text x="1205" y="791" text-anchor="middle" font-size="10" fill="#92400E">No prescription data. No lab results. No insurance information.</text>

  <!-- Bottom bar -->
  <rect x="40" y="845" width="1520" height="35" rx="6" fill="#F0FDFA" stroke="#00B4D8" stroke-width="1"/>
  <text x="800" y="868" text-anchor="middle" font-size="11" font-weight="600" fill="#0E7490">The zero-PHI model represents an alternative to "encrypt and protect PHI" — FSL is designed so that no sensitive data enters the system in the first place.</text>
</svg>
