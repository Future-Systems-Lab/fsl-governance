<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="1600" height="500" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="1600" height="500" fill="#FFFFFF"/>
  <text x="800" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1E293B">Figure A. Hybrid Consent Architecture — From Wallet Connection to On-Chain Attestation</text>

  <!-- Flow boxes -->
  <rect x="30" y="80" width="180" height="90" rx="6" fill="#F8FAFC" stroke="#334155" stroke-width="2"/>
  <text x="120" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">WALLET</text>
  <text x="120" y="135" text-anchor="middle" font-size="11" fill="#64748B">Brave / Rainbow</text>
  <text x="120" y="150" text-anchor="middle" font-size="11" fill="#64748B">EIP-6963 discovery</text>

  <polygon points="225,125 255,115 255,135" fill="#334155"/>

  <rect x="270" y="80" width="180" height="90" rx="6" fill="#F8FAFC" stroke="#334155" stroke-width="2"/>
  <text x="360" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">SIGNATURE</text>
  <text x="360" y="135" text-anchor="middle" font-size="11" fill="#64748B">personal_sign (EIP-191)</text>
  <text x="360" y="150" text-anchor="middle" font-size="11" fill="#64748B">65-byte ECDSA (r,s,v)</text>

  <polygon points="465,125 495,115 495,135" fill="#334155"/>

  <rect x="510" y="80" width="180" height="90" rx="6" fill="#F8FAFC" stroke="#334155" stroke-width="2"/>
  <text x="600" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">NONCE</text>
  <text x="600" y="135" text-anchor="middle" font-size="11" fill="#64748B">128-bit CSPRNG</text>
  <text x="600" y="150" text-anchor="middle" font-size="11" fill="#64748B">Address-bound, TTL</text>

  <polygon points="705,125 735,115 735,135" fill="#334155"/>

  <rect x="750" y="80" width="180" height="90" rx="6" fill="#F8FAFC" stroke="#334155" stroke-width="2"/>
  <text x="840" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">JWT</text>
  <text x="840" y="135" text-anchor="middle" font-size="11" fill="#64748B">HS256, HttpOnly cookie</text>
  <text x="840" y="150" text-anchor="middle" font-size="11" fill="#64748B">Max 24h expiry</text>

  <polygon points="945,125 975,115 975,135" fill="#334155"/>

  <rect x="990" y="80" width="200" height="90" rx="6" fill="#F8FAFC" stroke="#334155" stroke-width="2"/>
  <text x="1090" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">ACCESS GRANT</text>
  <text x="1090" y="135" text-anchor="middle" font-size="11" fill="#64748B">Middleware verification</text>
  <text x="1090" y="150" text-anchor="middle" font-size="11" fill="#64748B">Role-gated routes</text>

  <polygon points="1205,125 1235,115 1235,135" fill="#334155"/>

  <rect x="1250" y="80" width="320" height="90" rx="6" fill="#F1F5F9" stroke="#334155" stroke-width="2.5"/>
  <text x="1410" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">BLOCKCHAIN ATTESTATION</text>
  <text x="1410" y="135" text-anchor="middle" font-size="11" fill="#64748B">SessionStarted / SessionEnded</text>
  <text x="1410" y="150" text-anchor="middle" font-size="11" fill="#64748B">Ethereum Sepolia (immutable)</text>

  <!-- Annotation row -->
  <rect x="30" y="210" width="1540" height="50" rx="4" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="800" y="232" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">CONSENT = AUTHENTICATION — Single cryptographic signature serves as identity verification + informed consent + session authorization</text>
  <text x="800" y="250" text-anchor="middle" font-size="11" fill="#64748B">Patent Pending — U.S. Provisional Application No. 64/063,037</text>

  <!-- Three properties -->
  <rect x="30" y="290" width="490" height="70" rx="4" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <text x="275" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">VERIFIABLE</text>
  <text x="275" y="338" text-anchor="middle" font-size="11" fill="#64748B">Any third party can verify the signature independently</text>

  <rect x="555" y="290" width="490" height="70" rx="4" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <text x="800" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">ATTRIBUTABLE</text>
  <text x="800" y="338" text-anchor="middle" font-size="11" fill="#64748B">Bound to a specific Ethereum address — non-forgeable</text>

  <rect x="1080" y="290" width="490" height="70" rx="4" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <text x="1325" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">PORTABLE</text>
  <text x="1325" y="338" text-anchor="middle" font-size="11" fill="#64748B">Self-contained proof the participant can retain</text>

  <!-- Zero-PHI note -->
  <text x="800" y="410" text-anchor="middle" font-size="12" fill="#64748B">Zero PII transmitted at any step. No name, email, password, or personal identifier enters FSL infrastructure.</text>
  <text x="800" y="430" text-anchor="middle" font-size="12" fill="#64748B">Wallet addresses are pseudonymous — not linked to real-world identity by FSL.</text>
</svg>
