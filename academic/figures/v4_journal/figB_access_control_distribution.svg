<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" width="1600" height="600" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="1600" height="600" fill="#FFFFFF"/>
  <text x="800" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1E293B">Figure B. Access Control Distribution Across 9 Deployed Smart Contracts</text>

  <!-- Horizontal bar chart -->
  <text x="60" y="100" font-size="13" font-weight="600" fill="#334155">Owner-minted (5)</text>
  <rect x="300" y="82" width="556" height="28" rx="4" fill="#94A3B8"/>
  <text x="870" y="101" font-size="12" fill="#64748B">HNT, EHTv2, MindMasteryNFT, SovereignAchievement, NeuroBalanceConsent*</text>

  <text x="60" y="160" font-size="13" font-weight="600" fill="#334155">Open registration (1)</text>
  <rect x="300" y="142" width="111" height="28" rx="4" fill="#64748B"/>
  <text x="425" y="161" font-size="12" fill="#64748B">SovereignLedger v2</text>

  <text x="60" y="220" font-size="13" font-weight="600" fill="#334155">Fully permissionless (1)</text>
  <rect x="300" y="202" width="111" height="28" rx="4" fill="#334155"/>
  <text x="425" y="221" font-size="12" fill="#64748B">AlchemistForge</text>

  <text x="60" y="280" font-size="13" font-weight="600" fill="#334155">Guide-initiated (1)</text>
  <rect x="300" y="262" width="111" height="28" rx="4" fill="#475569"/>
  <text x="425" y="281" font-size="12" fill="#64748B">SovereignSession</text>

  <text x="60" y="340" font-size="13" font-weight="600" fill="#334155">Owner-distributed (1)</text>
  <rect x="300" y="322" width="111" height="28" rx="4" fill="#CBD5E1"/>
  <text x="425" y="341" font-size="12" fill="#64748B">BenevolenceFund v2</text>

  <!-- Axis -->
  <line x1="300" y1="70" x2="300" y2="360" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Governance summary -->
  <rect x="60" y="400" width="1480" height="90" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="800" y="425" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Governance Summary</text>
  <text x="800" y="448" text-anchor="middle" font-size="12" fill="#64748B">7 of 9 contracts (78%) are under single deployer wallet control. Migration to multisig governance is planned for mainnet.</text>
  <text x="800" y="468" text-anchor="middle" font-size="12" fill="#64748B">Only AlchemistForge (fully permissionless) and SovereignLedger v2 (open registration) operate without owner authority.</text>
  <text x="800" y="485" text-anchor="middle" font-size="11" fill="#94A3B8">* NeuroBalanceConsent is scaffolded infrastructure; full platform not yet operational.</text>

  <!-- Scale labels -->
  <text x="300" y="380" font-size="10" fill="#94A3B8">0</text>
  <text x="411" y="380" font-size="10" fill="#94A3B8">1</text>
  <text x="522" y="380" font-size="10" fill="#94A3B8">2</text>
  <text x="633" y="380" font-size="10" fill="#94A3B8">3</text>
  <text x="744" y="380" font-size="10" fill="#94A3B8">4</text>
  <text x="856" y="380" font-size="10" fill="#94A3B8">5</text>
  <text x="300" y="395" font-size="10" fill="#94A3B8">Contract count</text>
</svg>
