<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 880" width="1600" height="880" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      text { fill: #1E293B; }
      .title { font-size: 24px; font-weight: 700; }
      .subtitle { font-size: 15px; fill: #475569; }
      .layer { font-size: 16px; font-weight: 700; letter-spacing: 1.5px; }
      .plat-name { font-size: 16px; font-weight: 700; fill: #FFFFFF; }
      .plat-desc { font-size: 14px; fill: #475569; }
      .contract { font-size: 14px; font-weight: 600; fill: #0E7490; }
      .group-head { font-size: 13px; font-weight: 700; fill: #475569; }
      .db-label { font-size: 15px; font-weight: 700; fill: #FFFFFF; }
      .db-desc { font-size: 13px; fill: #475569; }
      .banner { font-size: 15px; font-weight: 700; }
      .phase5 { font-size: 14px; font-weight: 700; fill: #7B2FBE; }
      .phase5-desc { font-size: 12px; fill: #7B2FBE; }
    </style>
    <marker id="arw" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#B8860B"/></marker>
    <marker id="arw-g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#94A3B8"/></marker>
  </defs>

  <rect width="1600" height="880" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="800" y="32" text-anchor="middle" class="title">Figure 1. System Architecture — FSL Decentralized Health Data Infrastructure</text>
  <text x="800" y="52" text-anchor="middle" class="subtitle">Five platforms share unified EIP-191 authentication connecting to nine on-chain smart contracts</text>

  <!-- TOP CYAN CALLOUT — Zero-PHI (moved from bottom) -->
  <rect x="40" y="64" width="1520" height="30" rx="6" fill="#E6F9FF" stroke="#00D9FF" stroke-width="1.5"/>
  <text x="800" y="84" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">ZERO-PHI ARCHITECTURE — FSL operates outside HIPAA scope by holding no Protected Health Information in any layer</text>

  <!-- PLATFORM LAYER -->
  <text x="40" y="118" class="layer" fill="#475569">PLATFORM LAYER</text>
  <line x1="210" y1="114" x2="1560" y2="114" stroke="#E2E8F0" stroke-width="1"/>

  <!-- 5 platform boxes -->
  <rect x="40" y="130" width="280" height="72" rx="8" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
  <rect x="40" y="130" width="280" height="28" rx="8" fill="#475569"/><rect x="40" y="146" width="280" height="12" fill="#475569"/>
  <text x="180" y="150" text-anchor="middle" class="plat-name">EncryptHealth</text>
  <text x="180" y="174" text-anchor="middle" class="plat-desc">Sovereign health records</text>
  <text x="180" y="192" text-anchor="middle" class="plat-desc">Wallet-gated consent</text>

  <rect x="350" y="130" width="280" height="72" rx="8" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
  <rect x="350" y="130" width="280" height="28" rx="8" fill="#475569"/><rect x="350" y="146" width="280" height="12" fill="#475569"/>
  <text x="490" y="150" text-anchor="middle" class="plat-name">HypnoNeuro</text>
  <text x="490" y="174" text-anchor="middle" class="plat-desc">L1/L2/L3 game demos</text>
  <text x="490" y="192" text-anchor="middle" class="plat-desc">HNT token + NFT gating</text>

  <rect x="660" y="130" width="280" height="72" rx="8" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
  <rect x="660" y="130" width="280" height="28" rx="8" fill="#475569"/><rect x="660" y="146" width="280" height="12" fill="#475569"/>
  <text x="800" y="150" text-anchor="middle" class="plat-name">SovereignLedger</text>
  <text x="800" y="174" text-anchor="middle" class="plat-desc">Session governance</text>
  <text x="800" y="192" text-anchor="middle" class="plat-desc">Dual-chain: Sepolia + XRPL</text>

  <rect x="970" y="130" width="280" height="72" rx="8" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
  <rect x="970" y="130" width="280" height="28" rx="8" fill="#475569"/><rect x="970" y="146" width="280" height="12" fill="#475569"/>
  <text x="1110" y="150" text-anchor="middle" class="plat-name">AlchemistForge</text>
  <text x="1110" y="174" text-anchor="middle" class="plat-desc">Permissionless shadow work</text>
  <text x="1110" y="192" text-anchor="middle" class="plat-desc">No owner, no admin</text>

  <rect x="1280" y="130" width="280" height="72" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="1280" y="130" width="280" height="28" rx="8" fill="#94A3B8"/><rect x="1280" y="146" width="280" height="12" fill="#94A3B8"/>
  <text x="1420" y="150" text-anchor="middle" class="plat-name">NeuroBalance</text>
  <text x="1420" y="174" text-anchor="middle" class="plat-desc">Biosensor integration</text>
  <text x="1420" y="192" text-anchor="middle" font-size="12" fill="#94A3B8">Scaffolded</text>

  <!-- SOLID ARROWS with arrowheads to auth bus -->
  <line x1="180" y1="202" x2="180" y2="218" stroke="#B8860B" stroke-width="2" marker-end="url(#arw)"/>
  <line x1="490" y1="202" x2="490" y2="218" stroke="#B8860B" stroke-width="2" marker-end="url(#arw)"/>
  <line x1="800" y1="202" x2="800" y2="218" stroke="#B8860B" stroke-width="2" marker-end="url(#arw)"/>
  <line x1="1110" y1="202" x2="1110" y2="218" stroke="#B8860B" stroke-width="2" marker-end="url(#arw)"/>
  <line x1="1420" y1="202" x2="1420" y2="218" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arw-g)"/>

  <!-- EIP-191 AUTH BUS — gold background, dark gold border -->
  <rect x="40" y="220" width="1520" height="46" rx="6" fill="#FFD700" stroke="#B8860B" stroke-width="2"/>
  <text x="800" y="239" text-anchor="middle" class="banner" fill="#3D2800">EIP-191 WALLET-SIGNED CONSENT — UNIFIED AUTHENTICATION PRIMITIVE</text>
  <text x="800" y="257" text-anchor="middle" font-size="12" fill="#5C3D00">Single cryptographic signature = identity + consent + authorization (Patent Pending 64/063,037)</text>

  <!-- ON-CHAIN LAYER -->
  <rect x="40" y="285" width="1520" height="200" rx="8" fill="#E6F9FF" stroke="#00D9FF" stroke-width="1.5"/>
  <text x="60" y="308" class="layer" fill="#00D9FF">ON-CHAIN — ETHEREUM SEPOLIA</text>

  <!-- Owner-controlled row -->
  <text x="60" y="332" class="group-head">OWNER-CONTROLLED</text>
  <rect x="60" y="340" width="230" height="46" rx="6" fill="#FFFFFF" stroke="#00D9FF" stroke-width="1.2"/>
  <text x="175" y="360" text-anchor="middle" class="contract">HypnoNeuroToken (HNT)</text>
  <text x="175" y="376" text-anchor="middle" font-size="12" fill="#00D9FF">ERC-20 engagement token</text>

  <rect x="310" y="340" width="200" height="46" rx="6" fill="#FFFFFF" stroke="#00D9FF" stroke-width="1.2"/>
  <text x="410" y="360" text-anchor="middle" class="contract">EHTv2</text>
  <text x="410" y="376" text-anchor="middle" font-size="12" fill="#00D9FF">ERC-20 — 144K cap</text>

  <rect x="530" y="340" width="220" height="46" rx="6" fill="#FFFFFF" stroke="#00D9FF" stroke-width="1.2"/>
  <text x="640" y="360" text-anchor="middle" class="contract">MindMasteryNFT</text>
  <text x="640" y="376" text-anchor="middle" font-size="12" fill="#00D9FF">ERC-1155 achievement</text>

  <rect x="770" y="340" width="230" height="46" rx="6" fill="#FFFFFF" stroke="#00D9FF" stroke-width="1.2"/>
  <text x="885" y="360" text-anchor="middle" class="contract">BenevolenceFund v2</text>
  <text x="885" y="376" text-anchor="middle" font-size="12" fill="#00D9FF">3% community treasury</text>

  <rect x="1020" y="340" width="250" height="46" rx="6" fill="#FFFFFF" stroke="#00D9FF" stroke-width="1.2"/>
  <text x="1145" y="360" text-anchor="middle" class="contract">SovereignAchievement</text>
  <text x="1145" y="376" text-anchor="middle" font-size="12" fill="#00D9FF">Soulbound — 20 tiers</text>

  <rect x="1290" y="340" width="250" height="46" rx="6" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="1415" y="360" text-anchor="middle" font-size="14" font-weight="600" fill="#94A3B8">NeuroBalanceConsent</text>
  <text x="1415" y="376" text-anchor="middle" font-size="12" fill="#94A3B8">Scaffolded</text>

  <!-- Open/Permissionless row -->
  <text x="60" y="414" class="group-head">OPEN REGISTRATION / PERMISSIONLESS</text>
  <rect x="60" y="422" width="300" height="46" rx="6" fill="#FFFFFF" stroke="#00D9FF" stroke-width="1.5"/>
  <text x="210" y="442" text-anchor="middle" class="contract">SovereignLedger v2</text>
  <text x="210" y="458" text-anchor="middle" font-size="12" fill="#00D9FF">Session governance — open reg</text>

  <rect x="390" y="422" width="300" height="46" rx="6" fill="#FFFFFF" stroke="#22CC66" stroke-width="1.5"/>
  <text x="540" y="442" text-anchor="middle" font-size="14" font-weight="600" fill="#065F46">AlchemistForge</text>
  <text x="540" y="458" text-anchor="middle" font-size="12" fill="#22CC66">Fully permissionless</text>

  <rect x="720" y="422" width="300" height="46" rx="6" fill="#FFFFFF" stroke="#00D9FF" stroke-width="1.2"/>
  <text x="870" y="442" text-anchor="middle" class="contract">SovereignSession</text>
  <text x="870" y="458" text-anchor="middle" font-size="12" fill="#00D9FF">Guide-initiated attestation</text>

  <!-- ON/OFF BOUNDARY -->
  <rect x="40" y="498" width="1520" height="2" fill="#CBD5E1"/>
  <text x="800" y="516" text-anchor="middle" font-size="13" font-weight="600" fill="#94A3B8">ON-CHAIN / OFF-CHAIN BOUNDARY</text>

  <!-- OFF-CHAIN LAYER -->
  <rect x="40" y="528" width="1520" height="170" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="60" y="550" class="layer" fill="#475569">OFF-CHAIN — ENGAGEMENT METADATA ONLY</text>

  <!-- PostgreSQL -->
  <rect x="60" y="562" width="500" height="100" rx="6" fill="#FFFFFF" stroke="#475569" stroke-width="1.2"/>
  <rect x="60" y="562" width="500" height="26" rx="6" fill="#475569"/><rect x="60" y="576" width="500" height="12" fill="#475569"/>
  <text x="310" y="581" text-anchor="middle" class="db-label">PostgreSQL 17</text>
  <text x="310" y="604" text-anchor="middle" class="db-desc">Session timestamps, wallet addresses, completion rates</text>
  <text x="310" y="622" text-anchor="middle" class="db-desc">Consent grants, achievement logs</text>
  <rect x="80" y="636" width="460" height="20" rx="4" fill="#D1FAE5" stroke="#22CC66" stroke-width="1"/>
  <text x="310" y="651" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">ZERO PHI — No names, DOB, SSN, diagnosis</text>

  <!-- IPFS -->
  <rect x="590" y="562" width="370" height="100" rx="6" fill="#FFFFFF" stroke="#475569" stroke-width="1.2"/>
  <rect x="590" y="562" width="370" height="26" rx="6" fill="#475569"/><rect x="590" y="576" width="370" height="12" fill="#475569"/>
  <text x="775" y="581" text-anchor="middle" class="db-label">IPFS (Pinata)</text>
  <text x="775" y="604" text-anchor="middle" class="db-desc">Encrypted documents — wallet-gated</text>
  <text x="775" y="622" text-anchor="middle" class="db-desc">Participant holds decryption key</text>
  <rect x="610" y="636" width="330" height="20" rx="4" fill="#D1FAE5" stroke="#22CC66" stroke-width="1"/>
  <text x="775" y="651" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">Encrypted — key held by participant</text>

  <!-- VPS + XRPL combined -->
  <rect x="990" y="562" width="280" height="100" rx="6" fill="#FFFFFF" stroke="#475569" stroke-width="1.2"/>
  <rect x="990" y="562" width="280" height="26" rx="6" fill="#475569"/><rect x="990" y="576" width="280" height="12" fill="#475569"/>
  <text x="1130" y="581" text-anchor="middle" class="db-label">VPS + XRPL Anchor</text>
  <text x="1130" y="604" text-anchor="middle" class="db-desc">PM2 · 17-agent AI council</text>
  <text x="1130" y="622" text-anchor="middle" class="db-desc">Dual-chain session anchor</text>
  <rect x="1010" y="636" width="240" height="20" rx="4" fill="#FFFBEB" stroke="#FFB400" stroke-width="1"/>
  <text x="1130" y="651" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">Centralized — migrate to Akash</text>

  <!-- ROADMAP ROW — Phase 5 (moved from on-chain) -->
  <rect x="40" y="720" width="1520" height="56" rx="8" fill="#F3E8FF" stroke="#7B2FBE" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="60" y="745" class="layer" fill="#7B2FBE">ROADMAP</text>
  <text x="300" y="745" class="phase5">PHASE 5 — DOCTORAL CAPSTONE (planned)</text>
  <text x="300" y="763" class="phase5-desc">Two-party mutual EIP-191 authentication + client-side encrypted recording</text>
  <text x="1400" y="753" text-anchor="middle" font-size="12" fill="#7B2FBE">Advances SovereignSession from single-party to bilateral consent</text>
</svg>
